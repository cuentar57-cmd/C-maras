<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Cámaras de Motos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0d0d0d; color: #f0f0f0; font-family: 'Courier New', monospace; min-height: 100vh; font-size: 15px; }

header {
background: #111; border-bottom: 2px solid #ff4500;
padding: 14px 16px; position: sticky; top: 0; z-index: 100;
display: flex; align-items: center; justify-content: space-between;
}
.header-title .sub { font-size: 9px; color: #ff4500; letter-spacing: 3px; }
.header-title .main { font-size: 17px; font-weight: bold; letter-spacing: 1px; }
.tab-btns { display: flex; gap: 8px; }
.tab-btn {
background: transparent; border: 1.5px solid #444; color: #aaa;
padding: 7px 14px; cursor: pointer; font-size: 10px; letter-spacing: 2px;
font-family: inherit; border-radius: 2px; transition: all .2s;
}
.tab-btn.active { background: #ff4500; border-color: #ff4500; color: #fff; }

.stats-bar {
background: #161616; border-bottom: 1px solid #222;
padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
}
.stat .slabel { font-size: 8px; color: #555; letter-spacing: 1px; margin-bottom: 2px; }
.stat .sval { font-size: 18px; font-weight: bold; color: #ff4500; }

.container { padding: 16px; max-width: 500px; margin: 0 auto; }

.card {
background: #161616; border: 1px solid #2a2a2a;
border-top: 3px solid #ff4500; border-radius: 4px; padding: 18px;
margin-bottom: 16px;
}
.card-title { font-size: 10px; color: #ff4500; letter-spacing: 3px; margin-bottom: 16px; }

label { display: block; font-size: 9px; color: #666; letter-spacing: 2px; margin-bottom: 6px; margin-top: 14px; }
label:first-of-type { margin-top: 0; }

input[type=date] {
width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
border-radius: 2px; color: #f0f0f0; padding: 11px 12px;
font-size: 15px; font-family: ‘Courier New’, monospace; outline: none;
}
input[type=date]:focus { border-color: #ff4500; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.4); }

textarea {
width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
border-radius: 2px; color: #f0f0f0; padding: 11px 12px;
font-size: 14px; font-family: ‘Courier New’, monospace; outline: none;
resize: vertical; line-height: 1.5; min-height: 70px;
}
textarea:focus { border-color: #ff4500; }

/* CÁMARAS GRID */
.cameras-grid {
display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px;
}
.cam-btn {
background: #0d0d0d; border: 1.5px solid #2a2a2a; color: #aaa;
padding: 13px 8px; cursor: pointer; font-size: 13px; font-family: inherit;
border-radius: 3px; text-align: center; transition: all .15s; position: relative;
font-weight: bold; letter-spacing: 1px;
}
.cam-btn.selected {
background: #1a0800; border-color: #ff4500; color: #ff4500;
}
.cam-btn .check {
position: absolute; top: 5px; right: 7px; font-size: 10px; color: #ff4500;
display: none;
}
.cam-btn.selected .check { display: block; }

.selected-count {
margin-top: 10px; padding: 10px 12px; background: #0d0d0d;
border: 1px solid #2a2a2a; border-radius: 2px; font-size: 12px;
color: #888; text-align: center;
}
.selected-count span { color: #ff4500; font-weight: bold; font-size: 15px; }

.btn-save {
width: 100%; background: #ff4500; border: none; color: #fff;
padding: 15px; font-size: 12px; font-family: inherit; letter-spacing: 3px;
cursor: pointer; border-radius: 2px; font-weight: bold; margin-top: 16px;
}
.btn-save:disabled { background: #333; cursor: not-allowed; }
.btn-cancel {
width: 100%; background: transparent; border: 1.5px solid #444; color: #aaa;
padding: 12px; cursor: pointer; font-family: inherit; font-size: 10px;
border-radius: 2px; margin-top: 8px; letter-spacing: 2px;
}

.section-title { font-size: 9px; color: #555; letter-spacing: 3px; margin-bottom: 12px; margin-top: 20px; }

.record {
background: #161616; border: 1px solid #222; border-left: 3px solid #ff4500;
border-radius: 2px; padding: 14px; margin-bottom: 9px;
}
.record-top { display: flex; justify-content: space-between; align-items: flex-start; }
.rdate { font-size: 13px; font-weight: bold; letter-spacing: 1px; }
.rcams { font-size: 11px; color: #888; margin-top: 5px; line-height: 1.6; }
.rnote { font-size: 11px; color: #666; margin-top: 5px; font-style: italic; }
.rupdated { font-size: 9px; color: #333; margin-top: 4px; }
.record-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
.rcount { font-size: 26px; font-weight: bold; color: #ff4500; line-height: 1; }
.rcountlabel { font-size: 9px; color: #555; letter-spacing: 1px; }
.record-actions { display: flex; gap: 7px; margin-top: 10px; justify-content: flex-end; }
.btn-icon {
padding: 7px 14px; border: none; cursor: pointer;
font-size: 12px; border-radius: 2px; font-family: inherit; letter-spacing: 1px;
}
.btn-edit { background: #2a2a2a; color: #aaa; }
.btn-del { background: #2a0000; color: #ff6644; }

.view-all { background: none; border: none; color: #ff4500; cursor: pointer; font-size: 10px; font-family: inherit; letter-spacing: 2px; margin-top: 6px; padding: 4px 0; }
.empty { color: #444; padding: 40px 20px; text-align: center; font-size: 13px; line-height: 2; }
.empty a { color: #ff4500; cursor: pointer; }

#toast {
display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
padding: 12px 20px; border-radius: 4px; font-size: 12px; letter-spacing: 1px;
z-index: 999; white-space: nowrap; animation: fadeIn .2s ease;
max-width: 90vw; text-align: center;
}
#toast.ok { background: #1a3a1a; border: 1px solid #2d7a2d; color: #fff; }
#toast.err { background: #7a1a00; border: 1px solid #ff4500; color: #fff; }
@keyframes fadeIn { from { opacity:0; transform: translateX(-50%) translateY(8px) } to { opacity:1; transform: translateX(-50%) translateY(0) } }

/* Firebase banner */
.firebase-banner {
background: #1a1200; border: 1px solid #5a3a00; border-radius: 4px;
padding: 12px 14px; margin-bottom: 16px; font-size: 11px; color: #c8880a; line-height: 1.6;
}
.firebase-banner b { color: #ffaa22; }
</style>

</head>
<body>

<header>
  <div class="header-title">
    <div class="sub">CONTROL DIARIO</div>
    <div class="main">🏍 CÁMARAS</div>
  </div>
  <div class="tab-btns">
    <button class="tab-btn active" onclick="setView('register')">CARGAR</button>
    <button class="tab-btn" onclick="setView('history')">HISTORIAL</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="slabel">DÍAS</div><div class="sval" id="sDias">0</div></div>
  <div class="stat"><div class="slabel">TOTAL</div><div class="sval" id="sTotal">0</div></div>
  <div class="stat"><div class="slabel">PROM.</div><div class="sval" id="sProm">0</div></div>
  <div class="stat"><div class="slabel">MÁX.</div><div class="sval" id="sMax">0</div></div>
</div>

<div class="container">

  <!-- REGISTER VIEW -->

  <div id="viewRegister">

```
<div id="firebaseBanner" class="firebase-banner" style="display:none">
  ⚠ <b>Modo local:</b> los datos se guardan solo en este dispositivo. Conectá Firebase para compartir entre usuarios.
</div>

<div class="card">
  <div class="card-title" id="formTitle">▶ NUEVO REGISTRO</div>

  <label>FECHA</label>
  <input type="date" id="inDate"/>

  <label>SELECCIONÁ LAS CÁMARAS DEL DÍA</label>
  <div class="cameras-grid" id="camerasGrid"></div>

  <div class="selected-count" id="selectedCount">Ninguna cámara seleccionada</div>

  <label>OBSERVACIONES (opcional)</label>
  <textarea id="inNote" placeholder="Notas del día..."></textarea>

  <button class="btn-save" id="btnSave" onclick="handleSave()">GUARDAR</button>
  <button class="btn-cancel" id="btnCancel" style="display:none" onclick="cancelEdit()">CANCELAR EDICIÓN</button>
</div>

<div id="previewSection" style="display:none">
  <div class="section-title">ÚLTIMOS REGISTROS</div>
  <div id="previewList"></div>
  <button class="view-all" id="btnViewAll" onclick="setView('history')">VER HISTORIAL COMPLETO →</button>
</div>
```

  </div>

  <!-- HISTORY VIEW -->

  <div id="viewHistory" style="display:none">
    <div class="section-title" id="histCount">0 REGISTROS</div>
    <div id="historyList"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── CÁMARAS DISPONIBLES ──────────────────────────────
const CAMARAS = [
  '17.300','17.400','18.300','18.400',
  '14','16','21','19',
  '350.10','15'
];

// ── STORAGE: intenta window.storage (Claude), si no usa localStorage ──
const store = {
  async get(key) {
    try {
      if (window.storage) {
        const r = await window.storage.get('cam:'+key, true);
        return r ? JSON.parse(r.value) : null;
      }
    } catch {}
    try {
      const v = localStorage.getItem('cam:'+key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, val) {
    try {
      if (window.storage) {
        await window.storage.set('cam:'+key, JSON.stringify(val), true);
        return;
      }
    } catch {}
    try { localStorage.setItem('cam:'+key, JSON.stringify(val)); } catch {}
  },
  async delete(key) {
    try {
      if (window.storage) {
        await window.storage.delete('cam:'+key, true);
        return;
      }
    } catch {}
    try { localStorage.removeItem('cam:'+key); } catch {}
  },
  async listKeys() {
    try {
      if (window.storage) {
        const r = await window.storage.list('cam:', true);
        return r && r.keys ? r.keys.map(k => k.replace('cam:','')) : [];
      }
    } catch {}
    // localStorage fallback
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('cam:')) keys.push(k.replace('cam:',''));
    }
    return keys;
  },
  isShared() { return !!window.storage; }
};

let records = [];
let selectedCams = new Set();
let editingId = null;
let currentView = 'register';

function today() {
  return new Date().toISOString().split('T')[0];
}
function formatDate(d) {
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

// ── RENDER CAMERAS ───────────────────────────────────
function renderCameras() {
  const grid = document.getElementById('camerasGrid');
  grid.innerHTML = CAMARAS.map(cam => `
    <button class="cam-btn ${selectedCams.has(cam)?'selected':''}" onclick="toggleCam('${cam}')">
      <span class="check">✓</span>
      ${cam}
    </button>
  `).join('');
  updateSelectedCount();
}

function toggleCam(cam) {
  if (selectedCams.has(cam)) selectedCams.delete(cam);
  else selectedCams.add(cam);
  renderCameras();
}

function updateSelectedCount() {
  const el = document.getElementById('selectedCount');
  if (selectedCams.size === 0) {
    el.innerHTML = 'Ninguna cámara seleccionada';
  } else {
    el.innerHTML = `<span>${selectedCams.size}</span> cámara${selectedCams.size>1?'s':''} seleccionada${selectedCams.size>1?'s':''}: <b style="color:#ff4500">${[...selectedCams].join(', ')}</b>`;
  }
}

// ── LOAD RECORDS ─────────────────────────────────────
async function loadRecords() {
  try {
    const keys = await store.listKeys();
    const items = [];
    for (const key of keys) {
      try {
        const r = await store.get(key);
        if (r) items.push(r);
      } catch {}
    }
    items.sort((a,b) => b.date.localeCompare(a.date));
    records = items;
  } catch(e) {
    console.error('Error cargando:', e);
    records = [];
  }
  updateStats();
  renderCurrent();
  // Mostrar banner si no es compartido
  document.getElementById('firebaseBanner').style.display = store.isShared() ? 'none' : 'block';
}

function updateStats() {
  const total = records.reduce((s,r) => s+(r.count||0), 0);
  const max = records.length ? Math.max(...records.map(r=>r.count||0)) : 0;
  const prom = records.length ? Math.round(total/records.length) : 0;
  document.getElementById('sDias').textContent = records.length;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sProm').textContent = prom;
  document.getElementById('sMax').textContent = max;
}

function renderCurrent() {
  if (currentView === 'register') renderPreview();
  else renderHistory();
}

function renderPreview() {
  const section = document.getElementById('previewSection');
  if (records.length === 0) { section.style.display='none'; return; }
  section.style.display='block';
  document.getElementById('btnViewAll').style.display = records.length > 3 ? 'block' : 'none';
  document.getElementById('previewList').innerHTML = records.slice(0,3).map(r => recordHTML(r, false)).join('');
}

function renderHistory() {
  document.getElementById('histCount').textContent = records.length + ' REGISTROS';
  if (records.length === 0) {
    document.getElementById('historyList').innerHTML = `<div class="empty">No hay registros aún.<br><a onclick="setView('register')">Cargar el primero →</a></div>`;
    return;
  }
  document.getElementById('historyList').innerHTML = records.map(r => recordHTML(r, true)).join('');
}

function recordHTML(r, expanded) {
  const cams = r.cameras && r.cameras.length ? r.cameras.join(', ') : '—';
  const note = expanded && r.note ? `<div class="rnote">"${r.note}"</div>` : '';
  const upd = expanded && r.updatedAt ? `<div class="rupdated">actualizado: ${new Date(r.updatedAt).toLocaleString('es-AR')}</div>` : '';
  const camLine = expanded ? `<div class="rcams">📷 ${cams}</div>` : '';
  return `
    <div class="record">
      <div class="record-top">
        <div>
          <div class="rdate">${formatDate(r.date)}</div>
          ${camLine}${note}${upd}
        </div>
        <div class="record-right">
          <div class="rcount">${r.count||0}</div>
          <div class="rcountlabel">CÁMARAS</div>
        </div>
      </div>
      <div class="record-actions">
        <button class="btn-icon btn-edit" onclick='startEdit(${JSON.stringify(r)})'>✏ EDITAR</button>
        <button class="btn-icon btn-del" onclick="handleDelete('${r.id}')">✕ BORRAR</button>
      </div>
    </div>`;
}

function setView(v) {
  currentView = v;
  document.getElementById('viewRegister').style.display = v==='register' ? 'block' : 'none';
  document.getElementById('viewHistory').style.display = v==='history' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&v==='register')||(i===1&&v==='history'));
  });
  window.scrollTo({top:0, behavior:'smooth'});
  renderCurrent();
}

function startEdit(r) {
  editingId = r.id;
  document.getElementById('inDate').value = r.date;
  selectedCams = new Set(r.cameras || []);
  document.getElementById('inNote').value = r.note || '';
  document.getElementById('formTitle').textContent = '✏ EDITANDO REGISTRO';
  document.getElementById('btnSave').textContent = 'ACTUALIZAR';
  document.getElementById('btnCancel').style.display = 'block';
  renderCameras();
  setView('register');
}

function cancelEdit() {
  editingId = null;
  selectedCams = new Set();
  document.getElementById('inDate').value = today();
  document.getElementById('inNote').value = '';
  document.getElementById('formTitle').textContent = '▶ NUEVO REGISTRO';
  document.getElementById('btnSave').textContent = 'GUARDAR';
  document.getElementById('btnCancel').style.display = 'none';
  renderCameras();
}

async function handleSave() {
  const date = document.getElementById('inDate').value;
  if (!date) { showToast('Seleccioná una fecha.','err'); return; }
  if (selectedCams.size === 0) { showToast('Seleccioná al menos una cámara.','err'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';

  const cameras = [...selectedCams];
  const key = date;
  const record = {
    id: 'cam:'+date, date,
    cameras,
    count: cameras.length,
    note: document.getElementById('inNote').value.trim(),
    updatedAt: new Date().toISOString()
  };

  try {
    await store.set(key, record);
    showToast('✓ Guardado correctamente');
    cancelEdit();
    await loadRecords();
  } catch(e) {
    console.error(e);
    showToast('Error al guardar. Intentá de nuevo.','err');
  }
  btn.disabled = false;
  btn.textContent = editingId ? 'ACTUALIZAR' : 'GUARDAR';
}

async function handleDelete(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  const key = id.replace('cam:','');
  try {
    await store.delete(key);
    showToast('Registro eliminado');
    await loadRecords();
  } catch {
    showToast('Error al eliminar.','err');
  }
}

let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display='none'; }, 3000);
}

// ── INIT ─────────────────────────────────────────────
document.getElementById('inDate').value = today();
renderCameras();
loadRecords();
</script>

</body>
</html>
